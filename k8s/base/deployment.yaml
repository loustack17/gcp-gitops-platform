apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: go-api
    spec:
      imagePullSecrets:
        - name: ar-secret
      containers:
        - name: go-api
          # image: 127.0.0.1:5050/go-api:0.0.4
          image: us-east1-docker.pkg.dev/devops-lab-lou-2026/go-api/go-api:prod-7639a2426572cd239c8aba2d11e6c627db2f3a43
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
