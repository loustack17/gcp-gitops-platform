apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-config-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api-config-test
  template:
    metadata:
      labels:
        app: go-api-config-test
    spec:
      containers:
        - name: go-api
          image: 127.0.0.1:5050/go-api:0.0.6
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          envFrom:
            - configMapRef:
                name: go-api-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: go-api-secret
                  key: DB_PASSWORD
