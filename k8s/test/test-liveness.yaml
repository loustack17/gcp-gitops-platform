apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-liveness-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api-liveness-test
  template:
    metadata:
      labels:
        app: go-api-liveness-test
    spec:
      containers:
        - name: go-api
          image: 127.0.0.1:5050/go-api:0.0.5
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
