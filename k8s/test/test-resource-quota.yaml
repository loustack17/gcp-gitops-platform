apiVersion: v1
kind: Namespace
metadata:
  name: resource-test
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: small-quota
  namespace: resource-test
spec:
  hard:
    requests.memory: 100Mi
    limits.memory: 200Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-hungry
  namespace: resource-test
spec:
  replicas: 4
  selector:
    matchLabels:
      app: go-api-hungry
  template:
    metadata:
      labels:
        app: go-api-hungry
    spec:
      containers:
        - name: go-api
          image: 127.0.0.1:5050/go-api:0.0.5
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi
